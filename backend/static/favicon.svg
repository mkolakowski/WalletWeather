<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#1a2027" stroke="#2a323c" stroke-width="1"/>
  <!-- Wallet body -->
  <rect x="4" y="8" width="20" height="16" rx="2.5" fill="none" stroke="#58a6ff" stroke-width="1.8"/>
  <!-- Wallet flap/clasp -->
  <path d="M24 14 h4 v6 h-4 v-2 a2 2 0 0 1 0-4z" fill="#1a2027" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="26" cy="17" r="1.2" fill="#58a6ff"/>
  <!-- Forecast trend line (upward zigzag) -->
  <polyline points="6,21 10,18 14,20 18,14 22,11"
            fill="none" stroke="#3fb950" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend arrow head -->
  <polyline points="19.5,11 22,11 22,13.5"
            fill="none" stroke="#3fb950" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
